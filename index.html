<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KSS33 - Professional Construction Material Inventory & Site Management System">
  <title>KSS33 | Construction Materials Inventory</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'><path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'/><polyline points='9 22 9 12 15 12 15 22'/></svg>">

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css?v=3">
  <link rel="stylesheet" href="css/base.css?v=4">
  <link rel="stylesheet" href="css/components.css?v=7">
  <link rel="stylesheet" href="css/layout.css?v=5">
  <link rel="stylesheet" href="css/pages.css?v=3">
  <link rel="stylesheet" href="css/responsive.css?v=1">
  <style>
    @keyframes db-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <!-- Cloud DB Connection Loader Overlay -->
  <div id="db-loader-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; color: white; transition: opacity 0.4s ease, visibility 0.4s;">
    <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
      <div style="position: absolute; width: 80px; height: 80px; border-radius: 50%; background: rgba(59, 130, 246, 0.15); animation: pulse 2s infinite ease-in-out;"></div>
      <div style="width: 56px; height: 56px; border: 4px solid rgba(255,255,255,0.05); border-top-color: #3b82f6; border-right-color: #60a5fa; border-radius: 50%; animation: db-spin 0.85s linear infinite;"></div>
    </div>
    <div style="font-family: 'Outfit', 'Inter', sans-serif; font-size: 1.15rem; font-weight: 500; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Connecting to cloud database...</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #64748b; margin-top: 8px;">Syncing materials, sites, and dispatches</div>
  </div>

  <!-- App Root -->
  <div id="app-root"></div>

  <!-- JavaScript -->
  <script src="js/icons.js?v=7"></script>
  <script src="js/store.js?v=16"></script>
  <script src="js/auth.js?v=8"></script>
  <script src="js/dashboard.js?v=8"></script>
  <script src="js/sites2.js?v=14"></script>
  <script src="js/products.js?v=11"></script>
  <script src="js/incoming.js?v=7"></script>
  <script src="js/outgoing.js?v=9"></script>
  <script src="js/site-details2.js?v=14"></script>
  <script src="js/inventory.js?v=9"></script>
  <script src="js/ledger.js?v=9"></script>
  <script src="js/reports.js?v=9"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
